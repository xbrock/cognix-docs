name: CI

# Pre-deploy gate. Cloudflare Pages deploys only what passes this workflow,
# so this IS the pre-deploy hook — format-check, type-check, build,
# internal link-check, and workflow linting all run here.
# No Lighthouse / performance budget — that is cognix-web-only per the
# locked site-health design; the docs site gets no performance step.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Internal link-check
        uses: lycheeverse/lychee-action@v2
        with:
          # Scope the crawl to the built static site and only fail on broken
          # internal/relative links — external URLs are excluded so the gate
          # stays deterministic and offline-safe. --root-dir resolves
          # root-relative links (Starlight emits href="/...") against dist.
          args: --offline --no-progress --include-fragments --root-dir "${{ github.workspace }}/dist" './dist/**/*.html'
          fail: true

      - name: Lint workflow files
        uses: raven-actions/actionlint@v2
